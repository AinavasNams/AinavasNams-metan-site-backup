
# === METAN.LV production config ===

# === Map для X-Frame-Options: PDF разрешает iframe ===
map $request_uri $x_frame_options {
    default DENY;
    ~*\.pdf$ SAMEORIGIN;
}

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name metan.lv www.metan.lv;
    return 301 https://metan.lv$request_uri;
}

# === HTTPS сервер с объединёнными доменами и редиректом www → без www ===
server {
    listen 443 ssl http2;
    server_name metan.lv www.metan.lv;

    # 🔁 Редирект с www на основной домен
    if ($host = 'www.metan.lv') {
        return 301 https://metan.lv$request_uri;
    }

    # === SSL ===
    ssl_certificate     /etc/ssl/certs/cloudflare.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Favicon quick fix ---
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        add_header Cache-Control "no-store" always;
        return 204;
    }

    # === GZIP ===
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # === Security Headers ===
    proxy_hide_header X-Frame-Options;
    add_header X-Frame-Options $x_frame_options always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com https://www.google.com https://maps.googleapis.com https://static.cloudflareinsights.com https://eu-assets.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.google.com https://analytics.google.com https://www.googletagmanager.com https://maps.googleapis.com https://static.cloudflareinsights.com https://eu-assets.i.posthog.com https://metan.lv; frame-src 'self' https://www.googletagmanager.com https://www.google.com https://analytics.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # === Логирование ===
    access_log /var/log/nginx/metan.lv.access.log;
    error_log  /var/log/nginx/metan.lv.error.log warn;

    # --- Next.js статические файлы (выше всех!) ---

# === Static files from Next.js build ===
location /_next/static/ {
    alias /var/www/metan-site/.next/static/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# === Остальные служебные файлы Next.js ===
location /_next/ {
    proxy_pass http://127.0.0.1:3000;
    add_header X-Nginx-Location "NEXT" always;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
}

    # --- Изображения ---
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === Static files from public directory ===
    location /logos/ {
        alias /var/www/metan-site/public/logos/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /images/ {
        alias /var/www/metan-site/public/images/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /social/ {
        alias /var/www/metan-site/public/social/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # PDF and other public root files
    location ~* ^/[^/]+.(pdf|png|ico|html)$ {
        root /var/www/metan-site/public;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
    }

    # === Прокси основного приложения ===
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # === API ===
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 30s;
        proxy_connect_timeout 30s;
    }

    # === SEO ===
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000/robots.txt;
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000/sitemap.xml;
        expires 1d;
        add_header Cache-Control "public";
        add_header Content-Type "application/xml";
    }


    # === Google Analytics прокси ===
    location /g/collect {
        proxy_pass https://www.google-analytics.com/g/collect;
        proxy_set_header Host www.google-analytics.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # === Ошибки ===
    error_page 404 /404;
    error_page 500 502 503 504 /500;

    # === Буферы и таймауты ===
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
}

# === Мониторинг NGINX ===
server {
    listen 8080;
    server_name localhost;
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
